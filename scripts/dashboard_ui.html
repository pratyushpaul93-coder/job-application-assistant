<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PP Job Pipeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#111;font-size:14px}
.hdr{background:#fff;padding:14px 20px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #e5e5e5}
.stat{background:#f9f9f9;border-radius:8px;padding:10px 12px}
.stat-l{font-size:11px;color:#888;margin-bottom:3px}
.stat-n{font-size:20px;font-weight:600}
.filters{padding:10px 16px;background:#fff;border-bottom:1px solid #e5e5e5;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#555}
.pill.on{background:#111;color:#fff;border-color:#111}
.srch{margin-left:auto;font-size:12px;padding:5px 10px;border:1px solid #ddd;border-radius:20px;width:140px}
.jobs{padding:10px 16px 70px;max-width:900px;margin:0 auto}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card.sel{border:2px solid #1a7a55}
.card.tailored{border-color:#2563eb}
.top{display:flex;gap:10px;align-items:flex-start}
.cb{width:20px;height:20px;border:1.5px solid #ccc;border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.cb.on{background:#1a7a55;border-color:#1a7a55}
.info{flex:1;min-width:0}
.title{font-size:14px;font-weight:600;margin-bottom:3px}
.meta{font-size:12px;color:#777;display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;align-items:center}
.badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:600;margin-left:6px}
.b5{background:#dcf5eb;color:#0a5c38}
.b4{background:#dbeafe;color:#1e40af}
.b3{background:#f3f4f6;color:#555}
.sw{color:#b45309}.so{color:#166534}
.date-fresh{color:#166534;font-size:11px}
.date-old{color:#b45309;font-size:11px}
.date-stale{color:#991b1b;font-size:11px}
.acts{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.btn{font-size:12px;padding:5px 10px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;text-decoration:none;color:#111;display:inline-block;white-space:nowrap}
.grn{background:#1a7a55;color:#fff;border-color:#1a7a55}
.blu{background:#2563eb;color:#fff;border-color:#2563eb}
.reason{font-size:12px;color:#666;margin:8px 0 0 30px;line-height:1.5}
.cmt{margin:8px 0 0 30px}
textarea{width:100%;font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#fafafa;color:#111;resize:vertical;font-family:inherit}
textarea:focus{outline:none;border-color:#1a7a55}
.tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tl{font-size:11px;color:#888}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid #ddd;cursor:pointer;color:#555;background:#fff}
.tag.bad{background:#fef2f2;color:#991b1b;border-color:#fca5a5}
.tag.good{background:#f0fdf4;color:#166534;border-color:#86efac}
.tag.act{font-weight:700}
.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e5;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.toast{position:fixed;top:60px;right:16px;background:#111;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;z-index:100;display:none}
.tailor-status{font-size:11px;color:#2563eb;margin-left:6px;display:none}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.acts{display:none}}

.review-panel{display:none;margin:10px 0 0 30px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.review-panel.open{display:block}
.review-tabs{display:flex;border-bottom:1px solid #e5e5e5;background:#f9f9f9}
.review-tab{padding:8px 14px;font-size:12px;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.review-tab.active{color:#111;border-bottom-color:#111;font-weight:600}
.review-content{padding:12px;background:#fff}
.draft-text{font-size:11px;font-family:monospace;white-space:pre-wrap;line-height:1.5;color:#333;max-height:400px;overflow-y:auto;background:#f9f9f9;padding:10px;border-radius:6px}
.review-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.review-note{font-size:11px;color:#888;margin-top:6px}
</style>
</head>
<body>
<div class="hdr">
  <div><div style="font-size:16px;font-weight:600">Job pipeline</div><div style="font-size:12px;color:#888;margin-top:2px" id="meta">Loading...</div></div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="tailor-status" class="tailor-status"></span>
    <button class="btn" id="scan-btn" onclick="runScan()">Run scan</button>
    <button class="btn grn" onclick="alert('WhatsApp gateway pairing pending')">WhatsApp</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="stats">
  <div class="stat"><div class="stat-l">Total scanned</div><div class="stat-n" id="st0">-</div></div>
  <div class="stat"><div class="stat-l">Shortlisted</div><div class="stat-n" id="st1">-</div></div>
  <div class="stat"><div class="stat-l">Selected</div><div class="stat-n" id="st2">0</div></div>
  <div class="stat"><div class="stat-l">Commented</div><div class="stat-n" id="st3">0</div></div>
</div>
<div class="filters">
  <span class="pill on" data-f="all" onclick="setF(this)">All</span>
  <span class="pill" data-f="5" onclick="setF(this)">5/5</span>
  <span class="pill" data-f="4" onclick="setF(this)">4/5</span>
  <span class="pill" data-f="3" onclick="setF(this)">3/5</span>
  <span class="pill" data-f="sel" onclick="setF(this)">Selected</span>
  <span class="pill" data-f="com" onclick="setF(this)">Commented</span>
  <span class="pill" data-f="fresh" onclick="setF(this)">Posted &lt;14d</span>
  <span class="pill" data-f="tailored" onclick="setF(this)">Tailored</span>
  <input class="srch" placeholder="Search..." oninput="doSearch(this.value)">
</div>
<div class="jobs" id="list"></div>
<div class="bar">
  <span style="font-size:13px;color:#555"><span id="bsel">0</span> selected</span>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="tailorSelected()">Tailor selected</button>
    <button class="btn grn" onclick="alert('WhatsApp coming soon')">Send to WhatsApp</button>
  </div>
</div>
<script>
var jobs=[],comments={},selected=new Set(),filter='all',q='',tailoredUrls=new Set(),tailoredFiles={};
var TAGS=['Apply now','Maybe later','SQL blocker','Too senior','Wrong vertical','Location issue'];

function showToast(msg,ms){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none';},ms||2500);
}

function dateLabel(daysAgo){
  if(daysAgo===null||daysAgo===undefined)return '';
  if(daysAgo<=7)return '<span class="date-fresh">'+daysAgo+'d ago</span>';
  if(daysAgo<=14)return '<span class="date-fresh">'+daysAgo+'d ago</span>';
  if(daysAgo<=30)return '<span class="date-old">'+daysAgo+'d ago</span>';
  return '<span class="date-stale">'+daysAgo+'d ago</span>';
}

async function load(){
  var r=await fetch('/api/data');
  var d=await r.json();
  jobs=d.jobs||[];comments=d.comments||{};selected=new Set(d.selected||[]);
  document.getElementById('meta').textContent='Last scan: '+d.scan_date+' | '+d.companies+' companies';
  document.getElementById('st0').textContent=d.total_scanned||0;
  document.getElementById('st1').textContent=d.total_shortlisted||0;
  var tr=await fetch('/api/tailored_resumes').then(function(r){return r.json();}).catch(function(){return [];});
  tailoredUrls=new Set(tr.map(function(t){return t.job_url;}));
  tr.forEach(function(t){tailoredFiles[t.job_url]=t.tailored_file;});
  render();
}

function render(){
  var list=document.getElementById('list');
  var shown=jobs.filter(function(j){
    if(filter==='5'&&j.match_score!==5)return false;
    if(filter==='4'&&j.match_score!==4)return false;
    if(filter==='3'&&j.match_score!==3)return false;
    if(filter==='sel'&&!selected.has(j.job_url))return false;
    if(filter==='fresh'&&(j.days_ago===null||j.days_ago===undefined||j.days_ago>14))return false;
    if(filter==='tailored'&&!tailoredUrls.has(j.job_url))return false;
    if(filter==='com'){var c=comments[j.job_url];if(!c||(!c.text&&(!c.tags||!c.tags.length)))return false;}
    if(q&&!(j.role_title+j.company_name).toLowerCase().includes(q))return false;
    return true;
  });
  var html='';
  for(var i=0;i<shown.length;i++){
    var j=shown[i];var k=j.job_url;var isSel=selected.has(k);
    var isTailored=tailoredUrls.has(k);
    var c=comments[k]||{text:'',tags:[]};var sc=j.match_score;
    var bc=sc===5?'b5':sc===4?'b4':'b3';
    var loc=j.remote_ok?'Remote':(j.location_raw||'?');
    var sqlH=j.sql_required?'<span class="sw">SQL req</span>':j.sql_mentioned?'<span class="sw">SQL mentioned</span>':'<span class="so">no SQL</span>';
    var ek=JSON.stringify(k);
    var dateH=dateLabel(j.days_ago);
    var tH='<span class="tl">Tags:</span>';
    for(var t=0;t<TAGS.length;t++){
      var tg=TAGS[t];
      var tc=tg==='Apply now'?'tag good':(['SQL blocker','Too senior','Wrong vertical','Location issue'].indexOf(tg)>=0?'tag bad':'tag');
      var ta=(c.tags||[]).indexOf(tg)>=0?' act':'';
      tH+='<span class="'+tc+ta+'" onclick="toggleTag('+ek+','+JSON.stringify(tg)+')">'+tg+'</span>';
    }
    var cardCls='card'+(isSel?' sel':'')+(isTailored?' tailored':'');
    html+='<div class="'+cardCls+'"><div class="top">';
    html+='<div class="cb'+(isSel?' on':'')+'" onclick="toggleSel('+ek+')">'+(isSel?'&#10003;':'')+'</div>';
    html+='<div class="info"><div class="title">'+j.role_title+'<span class="badge '+bc+'">'+sc+'/5</span>'+(isTailored?'<span style="font-size:11px;color:#2563eb;margin-left:6px">&#10003; tailored</span>':'')+'</div>';
    html+='<div class="meta"><span>'+j.company_name+'</span><span>'+loc+'</span><span>'+j.company_stage+'</span>'+dateH+sqlH+'</div></div>';
    html+='<div class="acts"><a class="btn" href="'+j.apply_url+'" target="_blank">Apply</a><a class="btn" href="'+j.apply_url+'" target="_blank">View JD</a>';
    html+='<button class="btn '+(isTailored?'blu':'grn')+'" onclick="tailorOrView('+ek+','+i+','+JSON.stringify(j.role_title)+','+JSON.stringify(j.company_name)+')">'+(isTailored?'Review / Re-tailor':'Tailor')+'</button></div>';
    html+='</div>';
    html+='<div class="reason">'+(j.reason||'')+'</div>';
    html+='<div class="cmt"><textarea rows="1" placeholder="Add notes..." onchange="saveCmt('+ek+',this.value)">'+(c.text||'')+'</textarea>';
    html+='<div class="tags">'+tH+'</div></div>';
    var rp=tailoredFiles[k]||null;
    html+='<div class="review-panel" id="rp-'+i+'">';
    html+='<div class="review-tabs">';
    html+='<div class="review-tab active" onclick="switchTab('+i+',\'draft\',this)">Draft</div>';
    html+='<div class="review-tab" onclick="switchTab('+i+',\'revise\',this)">Revise</div>';
    html+='</div>';
    html+='<div class="review-content" id="rc-'+i+'">';
    html+='<div class="draft-text" id="dt-'+i+'">Loading draft...</div>';
    html+='<div class="review-actions">';
    html+='<button class="btn grn" onclick="generatePDF('+i+','+ek+')">Generate PDF</button>';
    html+='<span id="pdf-status-'+i+'" style="font-size:11px;color:#888"></span>';
    html+='</div>';
    html+='<div id="revise-panel-'+i+'" style="display:none;margin-top:10px">';
    html+='<textarea id="rev-input-'+i+'" rows="3" placeholder="Describe changes... e.g. Make the summary shorter, emphasize marketplace experience more"></textarea>';
    html+='<div class="review-actions">';
    html+='<button class="btn grn" onclick="applyRevision('+i+','+ek+')">Apply comments</button>';
    html+='<span id="rev-status-'+i+'" style="font-size:11px;color:#888"></span>';
    html+='</div></div>';
    html+='</div></div></div>';
  }
  list.innerHTML=html||'<div style="padding:30px;text-align:center;color:#888">No jobs match filter</div>';
  document.getElementById('st2').textContent=selected.size;
  document.getElementById('st3').textContent=Object.values(comments).filter(function(c){return c.text||(c.tags&&c.tags.length);}).length;
  document.getElementById('bsel').textContent=selected.size;
}

function toggleSel(k){
  if(selected.has(k)){selected.delete(k);}else{selected.add(k);}
  fetch('/api/select',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,selected:selected.has(k)})});
  render();
}

function saveCmt(k,text){
  if(!comments[k])comments[k]={text:'',tags:[]};
  comments[k].text=text;
  fetch('/api/comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,text:text,tags:comments[k].tags||[]})});
  render();
}

function toggleTag(k,tag){
  if(!comments[k])comments[k]={text:'',tags:[]};
  var tags=comments[k].tags||[];
  var idx=tags.indexOf(tag);
  if(idx>=0){tags.splice(idx,1);}else{tags.push(tag);}
  comments[k].tags=tags;
  fetch('/api/comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,text:comments[k].text||'',tags:tags})});
  render();
}

function setF(el){document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('on');});el.classList.add('on');filter=el.dataset.f;render();}
function doSearch(v){q=v.toLowerCase();render();}

function tailorJob(k,title,company){
  var job=jobs.find(function(j){return j.job_url===k;});
  if(!job)return;
  var ts=document.getElementById('tailor-status');
  ts.style.display='inline';ts.textContent='Tailoring '+company+'...';
  fetch('/api/tailor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_url:job.apply_url,role_title:title,company_name:company})});
  showToast('Tailoring started for '+title+' @ '+company+'. Takes ~30 seconds.',4000);
  pollTailorStatus();
}

function tailorSelected(){
  var sel=jobs.filter(function(j){return selected.has(j.job_url);});
  if(!sel.length){showToast('No jobs selected');return;}
  if(!confirm('Tailor resumes for '+sel.length+' selected jobs?'))return;
  sel.forEach(function(j){tailorJob(j.job_url,j.role_title,j.company_name);});
}

function pollTailorStatus(){
  var interval=setInterval(async function(){
    var r=await fetch('/api/tailor_status');
    var s=await r.json();
    var ts=document.getElementById('tailor-status');
    if(s.status==='done'){
      ts.textContent='';ts.style.display='none';
      showToast('Resume tailored! Click Tailor button to review draft.',4000);
      var tr2=await fetch('/api/tailored_resumes').then(function(r){return r.json();}).catch(function(){return [];});
      tr2.forEach(function(t){tailoredFiles[t.job_url]=t.tailored_file;});
      var tr=await fetch('/api/tailored_resumes').then(function(r){return r.json();}).catch(function(){return [];});
      tailoredUrls=new Set(tr.map(function(t){return t.job_url;}));
  tr.forEach(function(t){tailoredFiles[t.job_url]=t.tailored_file;});
      render();
      clearInterval(interval);
    } else if(s.status==='error'){
      ts.textContent='Tailor error';
      showToast('Tailor error: '+s.error,5000);
      clearInterval(interval);
    }
  },3000);
}

var scanPolling=null;
function runScan(){
  var btn=document.getElementById('scan-btn');
  btn.textContent='Scanning...';btn.disabled=true;btn.style.opacity='0.6';
  fetch('/api/scan',{method:'POST'});
  showToast('Scan started - takes ~2 minutes',4000);
  scanPolling=setInterval(async function(){
    var r=await fetch('/api/scan_status');
    var s=await r.json();
    if(s.status==='done'){
      btn.textContent='Scan ready';btn.disabled=false;btn.style.opacity='1';
      btn.style.background='#1a7a55';btn.style.color='#fff';btn.style.borderColor='#1a7a55';
      showToast('Scan complete! Refreshing data...',3000);
      clearInterval(scanPolling);
      setTimeout(function(){
        btn.textContent='Run scan';btn.style.background='';btn.style.color='';btn.style.borderColor='';
        load();
      },3000);
    }
  },5000);
}

load();

function tailorOrView(k, idx, title, company) {
  var rp = document.getElementById('rp-'+idx);
  if (!rp) return;
  // If already tailored and panel closed, open it to show draft
  if (tailoredUrls.has(k) && rp.style.display !== 'block') {
    rp.style.display = 'block';
    loadDraft(idx, k);
    return;
  }
  // If panel already open, close it
  if (rp.style.display === 'block') {
    rp.style.display = 'none';
    return;
  }
  // Otherwise tailor fresh
  tailorJob(k, title, company);
}

function loadDraft(idx, k) {
  var filename = tailoredFiles[k];
  if (!filename) { document.getElementById('dt-'+idx).textContent = 'No draft found'; return; }
  fetch('/api/tailored_resume_content?file='+encodeURIComponent(filename))
    .then(function(r){return r.json();})
    .then(function(d){
      var el = document.getElementById('dt-'+idx);
      if (el) el.textContent = d.content || d.error || 'Could not load';
    });
}

function switchTab(idx, tab, el) {
  document.querySelectorAll('#rp-'+idx+' .review-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  var rp = document.getElementById('revise-panel-'+idx);
  if (tab === 'revise') { if(rp) rp.style.display='block'; }
  else { if(rp) rp.style.display='none'; }
}

function generatePDF(idx, k) {
  var filename = tailoredFiles[k];
  if (!filename) { showToast('No draft file found'); return; }
  var status = document.getElementById('pdf-status-'+idx);
  if (status) { status.textContent = 'Generating PDF...'; }
  fetch('/api/generate_pdf', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({filename:filename})})
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.ok) {
        if (status) status.innerHTML = 'PDF ready! <a href="/api/download_pdf?file='+encodeURIComponent(d.pdf_filename)+'" style="color:#2563eb;text-decoration:underline" download>Download</a>';
      } else {
        if (status) status.textContent = 'Error: ' + (d.error||'unknown');
      }
    });
}

function applyRevision(idx, k) {
  var filename = tailoredFiles[k];
  var comments = document.getElementById('rev-input-'+idx);
  if (!filename || !comments || !comments.value.trim()) { showToast('Add revision notes first'); return; }
  var status = document.getElementById('rev-status-'+idx);
  if (status) status.textContent = 'Applying revision...';
  fetch('/api/revise', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({filename:filename, comments:comments.value})})
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.ok) {
        var dt = document.getElementById('dt-'+idx);
        if (dt) dt.textContent = d.content;
        if (status) status.textContent = 'Revision applied!';
        if (comments) comments.value = '';
        showToast('Revision applied. Review draft and generate PDF when ready.');
      } else {
        if (status) status.textContent = 'Error: '+(d.error||'unknown');
      }
    });
}

</script>
</body>
</html>
